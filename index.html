<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ミルスク レッスン予約</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --cream:#FFFBF2; --cream-2:#FFF3D9; --brown:#6B4226; --brown-soft:#B08968; --line:#F0DFC0;
    --pending:#FFD93D; --pending-text:#7A5A00; --confirmed:#8FD19E; --confirmed-text:#1F4D2C;
    --pink:#FF8FB1; --off-bg:#F5F0E6; --candidate:#FFC97A; --candidate-text:#7A4A00;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh; font-family:'M PLUS Rounded 1c', sans-serif;
    background:linear-gradient(150deg,#FFDE59 0%, #FF9F1C 60%, #FF8A3D 100%);
    padding:28px 14px 60px; color:var(--brown);
  }
  .page{ max-width:820px; margin:0 auto; }
  .hero{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:20px; }
  .hero-left{ display:flex; align-items:center; gap:16px; }
  .logo-badge{
    position:relative; width:58px; height:58px; background:var(--cream); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:26px;
    color:#FF9F1C; box-shadow:0 4px 0 rgba(107,66,38,0.15); flex-shrink:0;
  }
  .logo-badge .dot{ position:absolute; width:10px; height:10px; border-radius:50%; }
  .logo-badge .dot1{ background:var(--pink); top:-6px; right:-8px; }
  .logo-badge .dot2{ background:var(--pending); top:10px; right:-14px; width:8px; height:8px; }
  h1{ font-size:24px; font-weight:800; margin:0; color:var(--cream); text-shadow:0 2px 0 rgba(107,66,38,0.2); }
  .hero p{ margin:2px 0 0; font-size:13px; color:var(--cream); font-weight:500; opacity:0.9; }
  .icon-round-btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    height:40px; padding:0 16px; border-radius:999px; border:none; background:var(--cream);
    color:var(--brown); font-family:inherit; font-size:12.5px; font-weight:700;
    cursor:pointer; flex-shrink:0; box-shadow:0 3px 0 rgba(107,66,38,0.15); white-space:nowrap;
  }
  .icon-round-btn .ico{ font-size:16px; line-height:1; }
  .icon-round-btn:hover{ background:#fff; }
  .hero-actions{ display:flex; gap:8px; }

  .card{ background:var(--cream); border-radius:22px; padding:18px; box-shadow:0 6px 0 rgba(107,66,38,0.12); margin-bottom:16px; }
  .card h2{ font-size:15px; margin:0 0 12px; color:var(--brown); }

  .gate{ text-align:center; padding:20px 10px; }
  .gate p{ font-size:13px; color:var(--brown-soft); margin:0 0 14px; }
  .gate-row{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:10px; }
  .gate-row input{ flex:1; min-width:160px; }

  .profile-bar{ display:flex; align-items:center; justify-content:space-between; font-size:12.5px; color:var(--brown-soft); margin-bottom:12px; flex-wrap:wrap; gap:6px; }
  .profile-bar b{ color:var(--brown); }
  .profile-bar a{ color:#FF9F1C; font-weight:700; cursor:pointer; text-decoration:none; }

  .tabs{ display:flex; gap:8px; overflow-x:auto; padding:6px 2px 8px; margin-bottom:14px; -webkit-overflow-scrolling:touch; }
  .tab-btn{
    flex-shrink:0; font-family:inherit; font-size:13.5px; font-weight:700; padding:10px 16px;
    border-radius:999px; border:2px solid var(--line); background:#fff; color:var(--brown-soft);
    cursor:pointer; white-space:nowrap; transition:transform 0.1s ease;
  }
  .tab-btn.active{ border-color:var(--brown); box-shadow:0 0 0 1px var(--brown); }

  .toolbar-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
  .week-nav{ display:flex; align-items:center; gap:8px; }
  .week-nav button{
    font-family:inherit; font-size:13px; font-weight:700; background:var(--cream-2); border:none;
    color:var(--brown); padding:8px 14px; border-radius:999px; cursor:pointer;
  }
  .week-nav button:hover{ background:#FFE9B8; }
  .week-label{ font-size:14px; font-weight:700; color:var(--brown); }
  .link-btn{ font-family:inherit; font-size:12.5px; font-weight:700; background:none; border:none; color:#FF9F1C; cursor:pointer; text-decoration:underline; }

  .grid-wrap{ overflow-x:auto; border-radius:16px; }
  table.schedule{ border-collapse:separate; border-spacing:5px; width:100%; min-width:640px; }
  .col-head{ font-size:12px; font-weight:700; color:var(--brown-soft); text-align:center; padding:4px 2px; }
  .col-head.today{ color:#FF9F1C; }
  .hour-label{ font-size:12px; font-weight:700; color:var(--brown-soft); text-align:right; padding-right:8px; white-space:nowrap; width:52px; }
  .cell{
    height:46px; min-width:78px; border-radius:10px; text-align:center; vertical-align:middle;
    font-size:11.5px; font-weight:700; cursor:pointer; border:2px dashed var(--line); color:var(--brown-soft);
    background:#fffef9; transition:background 0.12s ease;
  }
  .cell:hover{ background:var(--cream-2); }
  .cell.pending{ border:none; background:var(--pending); color:var(--pending-text); }
  .cell.confirmed{ border:none; background:var(--confirmed); color:var(--confirmed-text); }
  .cell.off{ border:none; background:var(--off-bg); color:#C9BBA3; cursor:default; }
  .cell.candidate{ border:none; background:var(--candidate); color:var(--candidate-text); }

  .legend{ display:flex; gap:16px; flex-wrap:wrap; font-size:12.5px; color:var(--brown-soft); font-weight:600; margin-top:10px; }
  .legend span{ display:flex; align-items:center; gap:6px; }
  .swatch{ width:14px; height:14px; border-radius:5px; display:inline-block; }
  .swatch.open{ background:#fffef9; border:2px dashed var(--line); }
  .swatch.pending{ background:var(--pending); }
  .swatch.confirmed{ background:var(--confirmed); }
  .swatch.off{ background:var(--off-bg); }
  .swatch.candidate{ background:var(--candidate); }

  .candidate-bar{
    display:none; align-items:center; gap:10px; flex-wrap:wrap; background:var(--cream-2);
    border-radius:14px; padding:10px 14px; margin-top:12px;
  }
  .candidate-bar.show{ display:flex; }
  .candidate-chip{
    font-size:12px; font-weight:700; background:#fff; border:1px solid var(--line);
    border-radius:999px; padding:4px 10px; color:var(--brown);
  }
  .candidate-bar .spacer{ flex:1; }

  .status-msg{ text-align:center; font-size:12.5px; color:var(--cream); margin-top:6px; font-weight:600; }

  .list-empty{ font-size:13px; color:var(--brown-soft); text-align:center; padding:20px 0; }
  .list-row{ display:flex; align-items:center; gap:10px; padding:10px 8px; border-bottom:1px solid var(--line); font-size:13px; flex-wrap:wrap; }
  .list-row:last-child{ border-bottom:none; }
  .ins-dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .list-main{ flex:1; min-width:180px; }
  .list-main b{ color:var(--brown); }
  .list-main .meta{ color:var(--brown-soft); font-size:12px; margin-top:2px; }
  .badge{ font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:999px; }
  .badge.pending{ background:var(--pending); color:var(--pending-text); }
  .badge.confirmed{ background:var(--confirmed); color:var(--confirmed-text); }
  .list-actions{ display:flex; gap:6px; }
  .mini-btn{ font-family:inherit; font-size:12px; font-weight:700; border:none; border-radius:999px; padding:6px 12px; cursor:pointer; }
  .mini-btn.confirm{ background:var(--confirmed); color:var(--confirmed-text); }
  .mini-btn.cancel{ background:#FFE3DC; color:#B24C33; }

  .report-controls{ display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .stat-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:14px; }
  .stat-box{ background:var(--cream-2); border-radius:14px; padding:12px 14px; }
  .stat-box .num{ font-size:22px; font-weight:800; color:var(--brown); }
  .stat-box .label{ font-size:12px; color:var(--brown-soft); font-weight:600; margin-top:2px; }
  .breakdown-title{ font-size:12.5px; font-weight:700; color:var(--brown-soft); margin:10px 0 6px; }
  .breakdown-row{ display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px solid var(--line); }
  .breakdown-row:last-child{ border-bottom:none; }

  .modal-overlay{ display:none; position:fixed; inset:0; background:rgba(107,66,38,0.35); align-items:center; justify-content:center; padding:20px; z-index:20; }
  .modal-overlay.open{ display:flex; }
  .modal{ background:var(--cream); border-radius:22px; padding:24px; max-width:420px; width:100%; box-shadow:0 10px 0 rgba(107,66,38,0.15); max-height:86vh; overflow-y:auto; }
  .modal h2{ font-size:17px; margin:0 0 4px; color:var(--brown); }
  .modal .sub{ font-size:12.5px; color:var(--brown-soft); margin:0 0 16px; font-weight:600; }
  .modal label{ display:block; font-size:12px; font-weight:700; color:var(--brown-soft); margin-bottom:5px; }
  .modal input, .modal select, .modal textarea{
    width:100%; font-family:inherit; font-size:14px; padding:10px 12px; border-radius:12px;
    border:2px solid var(--line); background:#fff; color:var(--brown); margin-bottom:12px; resize:vertical;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus{ outline:none; border-color:#FF9F1C; }
  .modal .help{ font-size:11.5px; color:var(--brown-soft); margin:-6px 0 12px; line-height:1.5; }
  .status-pill{ display:inline-block; font-size:12px; font-weight:700; padding:4px 12px; border-radius:999px; margin-bottom:14px; }
  .status-pill.pending{ background:var(--pending); color:var(--pending-text); }
  .status-pill.confirmed{ background:var(--confirmed); color:var(--confirmed-text); }
  .info-row{ font-size:14px; margin-bottom:6px; }
  .info-row b{ color:var(--brown); }
  .modal-actions{ display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
  .btn{ font-family:inherit; font-size:13.5px; font-weight:700; padding:10px 16px; border-radius:999px; border:none; cursor:pointer; flex:1; }
  .btn-primary{ background:#FF9F1C; color:#fff; }
  .btn-primary:hover{ background:#F08F00; }
  .btn-confirm{ background:var(--confirmed); color:var(--confirmed-text); }
  .btn-confirm:hover{ background:#7BC48D; }
  .btn-danger{ background:#FFE3DC; color:#B24C33; }
  .btn-danger:hover{ background:#FFD1C4; }
  .btn-ghost{ background:var(--cream-2); color:var(--brown); }
  .btn-ghost:hover{ background:#FFE9B8; }

  .candidate-option{ display:flex; align-items:center; gap:8px; background:#fff; border:2px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:8px; font-size:13.5px; }
  .candidate-option input{ width:auto; margin:0; }

  .avail-table{ width:100%; border-collapse:collapse; font-size:12px; margin-bottom:12px; }
  .avail-table th, .avail-table td{ text-align:center; padding:4px; border-bottom:1px solid var(--line); }
  .avail-table th{ color:var(--brown-soft); font-weight:700; }
  .avail-table td:first-child, .avail-table th:first-child{ text-align:left; color:var(--brown-soft); font-weight:700; }

  .google-status{ font-size:12.5px; font-weight:700; padding:6px 12px; border-radius:999px; display:inline-block; margin-bottom:12px; }
  .google-status.on{ background:var(--confirmed); color:var(--confirmed-text); }
  .google-status.off{ background:#FFE3DC; color:#B24C33; }

  .month-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .month-daylabel{ font-size:11px; color:var(--brown-soft); text-align:center; font-weight:700; padding-bottom:2px; }
  .month-cell{ background:#fffef9; border-radius:10px; min-height:78px; padding:6px; font-size:11px; border:1px solid var(--line); }
  .month-cell.other-month{ opacity:0.35; }
  .month-cell.today{ border-color:#FF9F1C; border-width:2px; }
  .month-cell .daynum{ font-weight:700; color:var(--brown); margin-bottom:4px; }
  .month-event{ font-size:10px; font-weight:700; border-radius:6px; padding:2px 5px; margin-bottom:3px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .res-item{ display:flex; justify-content:space-between; align-items:center; background:#10192280; border:1px solid var(--line); border-radius:4px; padding:6px 10px; font-size:13px; margin-bottom:6px; }
  .res-item button{ background:none; border:none; color:var(--brown-soft); font-size:14px; cursor:pointer; }
  .res-item button:hover{ color:#B24C33; }
  .res-add{ display:flex; gap:8px; }

  /* もっとポップでかわいく: バウンス感・虹色アクセント・丸いスウォッチ */
  .card{ position:relative; overflow:hidden; }
  .card::before{
    content:''; position:absolute; top:0; left:0; right:0; height:6px;
    background:linear-gradient(90deg,#FFD93D,#FF8FB1,#B9A3FF,#8FD19E,#FF9F1C);
  }
  .logo-badge .dot1{ animation:pop-pulse 1.8s ease-in-out infinite; }
  @keyframes pop-pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.25); } }

  .btn, .tab-btn, .mini-btn, .icon-round-btn, .cell, .month-event{
    transition:transform 0.12s ease, box-shadow 0.12s ease;
  }
  .btn:hover, .mini-btn:hover, .icon-round-btn:hover{ transform:translateY(-2px) scale(1.03); }
  .btn:active, .mini-btn:active, .icon-round-btn:active{ transform:translateY(0) scale(0.96); }
  .tab-btn:hover{ transform:scale(1.04); }
  .tab-btn:active{ transform:scale(0.96); }
  .cell:hover{ transform:scale(1.05); }

  .btn-primary{ background:linear-gradient(135deg,#FFB347,#FF8FB1); }
  .btn-primary:hover{ background:linear-gradient(135deg,#FFA82E,#FF7CA6); }
  .btn-confirm{ background:linear-gradient(135deg,#8FD19E,#7FE8C4); }
  .mini-btn.confirm{ background:linear-gradient(135deg,#8FD19E,#7FE8C4); }

  .swatch{ border-radius:50% !important; }
  .ins-dot{ box-shadow:0 0 0 2px #fff, 0 0 0 3px var(--line); }
  .badge{ box-shadow:0 2px 0 rgba(107,66,38,0.1); }
  .status-pill{ box-shadow:0 2px 0 rgba(107,66,38,0.1); }

  h1{ letter-spacing:0.02em; }
  .cell.confirmed, .cell.pending, .cell.candidate{ border-radius:14px; }
  .month-cell{ border-radius:14px; }

  /* モバイルファースト: 基本は小画面向けの余白・文字サイズに絞り、広い画面では余裕を持たせる */
  .hero{ flex-wrap:wrap; }
  .hero-actions{ width:100%; }
  .icon-round-btn{ flex:1; }
  h1{ font-size:20px; }
  .card{ padding:14px; border-radius:18px; }
  .modal{ padding:18px; }

  @media (min-width:520px){
    .hero-actions{ width:auto; }
    .icon-round-btn{ flex:none; }
    h1{ font-size:24px; }
    .card{ padding:18px; border-radius:22px; }
    .modal{ padding:24px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div class="hero-left">
      <div class="logo-badge">M<span class="dot dot1"></span><span class="dot dot2"></span></div>
      <div>
        <h1>ミルスク</h1>
        <p>レッスン予約スケジュール — 限定メンバー用</p>
      </div>
    </div>
    <div class="hero-actions">
      <button class="icon-round-btn" id="open-google" aria-label="Googleカレンダー連携"><span class="ico">🗓</span>カレンダー連携</button>
      <button class="icon-round-btn" id="open-settings" aria-label="通知の設定"><span class="ico">⚙</span>通知設定</button>

  { id:'hii', name:'ひーさん' },
  { id:'riepyon', name:'りえぴょん' },
  { id:'aroma', name:'アロマ' },

function setStatus(msg){ statusEl.textContent = msg || ''; }
function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str == null ? '' : String(str); return d.innerHTML; }
function instructorOf(id){ return INSTRUCTORS.find(i => i.id === id); }
function isoWeekday(d){ const wd = d.getDay(); return wd === 0 ? 7 : wd; }
function weekdayJp(d){ return ['日','月','火','水','木','金','土'][d.getDay()]; }

function formspreeUrl(value){
  const v = (value || '').trim();
  if(!v) return '';
  if(v.startsWith('http')) return v;
  return `https://formspree.io/f/${v}`;
}

async function loadRequests(){
  try{
    const result = await window.storage.get(STORAGE_KEY, true);
    requests = result ? JSON.parse(result.value) : [];
  }catch(e){ requests = []; }
  requests.forEach(r => {
    if(r.status === 'pending' && !r.candidates){
      r.candidates = [{ date: r.date, hour: r.hour }];
    }
  });
}
async function saveRequests(){
  try{
    const ok = await window.storage.set(STORAGE_KEY, JSON.stringify(requests), true);
    if(!ok) setStatus('保存に失敗しました。もう一度お試しください。');
  }catch(e){ setStatus('保存に失敗しました。もう一度お試しください。'); }
}

async function loadAvailability(){
  try{
    const result = await window.storage.get(AVAILABILITY_KEY, true);
    availability = result ? JSON.parse(result.value) : {};
  }catch(e){ availability = {}; }
}
async function saveAvailability(){
  try{ await window.storage.set(AVAILABILITY_KEY, JSON.stringify(availability), true); }
  catch(e){ setStatus('対応可能時間の保存に失敗しました。'); }
}
function isAvailableResource(resourceId, weekday, hour){
  const map = availability[resourceId];
  if(!map) return true;
  const arr = map[weekday];
  if(!arr) return false;
  return arr.includes(hour);
}

async function loadNgDates(){
  try{
    const result = await window.storage.get(NG_DATES_KEY, true);
    ngDates = result ? JSON.parse(result.value) : {};
  }catch(e){ ngDates = {}; }
}
async function saveNgDates(){
  try{ await window.storage.set(NG_DATES_KEY, JSON.stringify(ngDates), true); }
  catch(e){ setStatus('NG日の保存に失敗しました。'); }
}
function isNgDateResource(resourceId, dateStr){
  const arr = ngDates[resourceId];
  return arr ? arr.includes(dateStr) : false;
}

async function loadNotifySettings(){
  try{
    const result = await window.storage.get(NOTIFY_SETTINGS_KEY, true);
    if(result) notifySettings = JSON.parse(result.value);
  }catch(e){}
}
async function saveNotifySettings(){
  try{ await window.storage.set(NOTIFY_SETTINGS_KEY, JSON.stringify(notifySettings), true); }
  catch(e){ setStatus('通知設定の保存に失敗しました。'); }
}

async function loadGoogleSettings(){
  try{
    const result = await window.storage.get(GOOGLE_SETTINGS_KEY, true);
    if(result){
      const parsed = JSON.parse(result.value);
      if(parsed.calendarIds){ googleSettings = parsed; }
      else if(parsed.calendarId){
        googleSettings = { clientId: parsed.clientId || '', calendarIds: {} };
        INSTRUCTORS.forEach(i => googleSettings.calendarIds[i.id] = parsed.calendarId);
      }
    }
  }catch(e){}
}
async function saveGoogleSettings(){
  try{ await window.storage.set(GOOGLE_SETTINGS_KEY, JSON.stringify(googleSettings), true); }
  catch(e){ setStatus('Googleカレンダー設定の保存に失敗しました。'); }

}

async function sendNotification(req, eventType){
  const url = formspreeUrl(notifySettings.endpoint);
  const isApplied = eventType === 'applied';
  if(!url){
    setStatus(isApplied ? '予約が申請されましたが、通知設定が未完了のためメールは送信されていません。' : '予約が確定しましたが、通知設定が未完了のためメールは送信されていません。');
    return;
  }
  const ins = instructorOf(req.instructorId);
  let dateTimeText;
  if(isApplied){
    dateTimeText = (req.candidates || []).map((c, i) => {
      const d = new Date(c.date + 'T00:00:00');
      return `${CANDIDATE_LABEL[i] || ''}: ${d.getMonth()+1}/${d.getDate()}(${weekdayJp(d)}) ${c.hour}:00〜${c.hour+1}:00`;
    }).join(' / ');
  }else{
    const d = new Date(req.date + 'T00:00:00');
    dateTimeText = `${d.getMonth()+1}/${d.getDate()}(${weekdayJp(d)}) ${req.hour}:00〜${req.hour+1}:00`;
  }
  const payload = {
    subject: isApplied ? 'ミルスク 予約の申請を受け付けました' : 'ミルスク 予約が確定しました',
    status_label: isApplied ? '申請中' : '確定',
    instructor: ins ? ins.name : req.instructorId,
    assigned_staff: req.assignedStaff || '',
    course: req.course || '未選択',
    applicant_name: req.name,
    email: req.email || '',
    datetime: dateTimeText,
    memo: req.memo || 'なし',
  };
  try{
    const res = await fetch(url, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Accept':'application/json' },
      body: JSON.stringify(payload),
    });
    setStatus(res.ok ? (isApplied ? '申請通知メールを送信しました。' : '確定通知メールを送信しました。') : '通知メールの送信に失敗しました。Formspreeの設定をご確認ください。');
  }catch(e){
    setStatus('通知メールの送信に失敗しました。Formspreeの設定をご確認ください。');
  }
}

function setupTokenClient(){
  if(!window.google || !googleSettings.clientId) { tokenClient = null; return; }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: googleSettings.clientId,
    scope: 'https://www.googleapis.com/auth/calendar.events',
    callback: (resp) => {
      if(resp && resp.access_token){
        googleAccessToken = resp.access_token;
        setStatus('Googleカレンダーと連携しました。');
        if(googleOverlayEl.classList.contains('open')) openGoogle();
      }
    },
  });
}

async function createCalendarEvent(req){
  if(!googleAccessToken){
    setStatus('予約は確定しましたが、Googleカレンダー未連携のため予定は追加されていません。');
    return;
  }
  const ins = instructorOf(req.instructorId);
  const pad = n => String(n).padStart(2,'0');
  const startDateTime = `${req.date}T${pad(req.hour)}:00:00`;
  const endDateTime = `${req.date}T${pad(req.hour+1)}:00:00`;
  const staffLine = req.assignedStaff ? `\n担当: ${req.assignedStaff}` : '';
  const event = {
    summary: `【${ins ? ins.name : ''}${req.assignedStaff ? '/' + req.assignedStaff : ''}】${req.course || ''} - ${req.name}`,
    description: `生徒: ${req.name}(${req.email || 'メール未登録'})\nコース: ${req.course || '未選択'}${staffLine}\nメモ: ${req.memo || 'なし'}`,
    start: { dateTime: startDateTime, timeZone: 'Asia/Tokyo' },
    end: { dateTime: endDateTime, timeZone: 'Asia/Tokyo' },
  };
  const calendarId = encodeURIComponent((googleSettings.calendarIds && googleSettings.calendarIds[req.instructorId]) || 'primary');
  try{
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${calendarId}/events`, {
      method:'POST',
      headers:{ 'Authorization': `Bearer ${googleAccessToken}`, 'Content-Type':'application/json' },
      body: JSON.stringify(event),
    });
    setStatus(res.ok ? 'Googleカレンダーに予定を追加しました。' : 'Googleカレンダーへの登録に失敗しました。連携をやり直してください。');
  }catch(e){
    setStatus('Googleカレンダーへの登録に失敗しました。連携をやり直してください。');
  }
}

function getWeekDates(offset){
  const today = new Date();
  const day = today.getDay();
  const diffToMonday = (day === 0 ? -6 : 1 - day);
  const monday = new Date(today);
  monday.setHours(0,0,0,0);
  monday.setDate(today.getDate() + diffToMonday + offset * 7);
  const dates = [];
  for(let i=0;i<7;i++){ const d = new Date(monday); d.setDate(monday.getDate() + i); dates.push(d); }
  return dates;
}
function dateKey(d){
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function isSameDate(a,b){ return dateKey(a) === dateKey(b); }

function getCellRequests(instructorId, dateObj, hour){
  const dstr = dateKey(dateObj);
  return requests.filter(r => r.instructorId === instructorId && (
    (r.status === 'confirmed' && r.date === dstr && r.hour === hour) ||
    (r.status === 'pending' && r.candidates && r.candidates.some(c => c.date === dstr && c.hour === hour))
  ));
}

function computeCapacity(instructorId, dateObj, hour){
  const wd = isoWeekday(dateObj);
  const dstr = dateKey(dateObj);
  if(instructorId === 'unei'){
    return UNEI_STAFF.filter(s => {
      const rid = 'unei_' + s.id;
      return isAvailableResource(rid, wd, hour) && !isNgDateResource(rid, dstr);
    }).length;
  }
  return (isAvailableResource(instructorId, wd, hour) && !isNgDateResource(instructorId, dstr)) ? 1 : 0;
}

function assignStaffForSlot(dateObj, hour, excludeReqId){
  const wd = isoWeekday(dateObj);
  const dstr = dateKey(dateObj);
  const usedStaff = new Set(
    requests
      .filter(r => r.instructorId === 'unei' && r.status === 'confirmed' && r.date === dstr && r.hour === hour && r.id !== excludeReqId && r.assignedStaff)
      .map(r => r.assignedStaff)
  );
  const staff = UNEI_STAFF.find(s => {
    const rid = 'unei_' + s.id;
    return isAvailableResource(rid, wd, hour) && !isNgDateResource(rid, dstr) && !usedStaff.has(s.name);
  });
  return staff ? staff.name : '';
}

function renderWeekLabel(dates){
  const first = dates[0], last = dates[6];
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  weekLabelEl.textContent = `${fmt(first)} 〜 ${fmt(last)}`;
}

function renderSchedule(){
  const dates = getWeekDates(weekOffset);
  renderWeekLabel(dates);
  const today = new Date();

  let html = '<thead><tr><th class="hour-label"></th>';
  dates.forEach(d => {
    const isToday = isSameDate(d, today);
    html += `<th class="col-head${isToday ? ' today' : ''}">${d.getMonth()+1}/${d.getDate()}<br>(${weekdayJp(d)})</th>`;
  });
  html += '</tr></thead><tbody>';

  HOURS.forEach(hour => {
    html += `<tr><td class="hour-label">${hour}:00</td>`;
    dates.forEach(d => {
      const dstr = dateKey(d);
      const capacity = computeCapacity(activeInstructor, d, hour);
      const cellReqs = getCellRequests(activeInstructor, d, hour);
      const remaining = capacity - cellReqs.length;
      const isSelected = selectedCandidates.some(c => c.date === dstr && c.hour === hour);

      let cls = 'cell';
      let label = '空き';
      let clickable = true;

      if(capacity === 0){
        cls += ' off'; label = '−'; clickable = false;
      }else if(remaining <= 0){
        const allConfirmed = cellReqs.length > 0 && cellReqs.every(r => r.status === 'confirmed');
        cls += allConfirmed ? ' confirmed' : ' pending';
        label = capacity > 1 ? (allConfirmed ? '確定(満)' : '調整中(満)') : (allConfirmed ? '確定' : '申請中');
        clickable = false;
      }else if(isSelected){
        cls += ' candidate';
        const idx = selectedCandidates.findIndex(c => c.date === dstr && c.hour === hour);
        label = `候補${idx+1}`;
      }else{
        label = capacity > 1 && remaining < capacity ? `空き(残${remaining})` : '空き';
      }

      html += `<td class="${cls}" ${clickable || isSelected ? `data-date="${dstr}" data-hour="${hour}"` : ''} data-clickable="${clickable}">${label}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  scheduleEl.innerHTML = html;
}

let listPopulatedFilter = false;
function renderList(){
  const isUnei = studentProfile && studentProfile.role === 'unei';
  const filterSelect = document.getElementById('list-instructor-filter');
  const titleEl = document.getElementById('list-title');

  if(isUnei){
    filterSelect.style.display = 'inline-block';
    if(!listPopulatedFilter){
      filterSelect.innerHTML = '<option value="all">すべての講師</option>' +
        INSTRUCTORS.map(i => `<option value="${i.id}">${escapeHtml(i.name)}</option>`).join('');
      filterSelect.value = listInstructorFilter;
      listPopulatedFilter = true;
    }
    const chosen = instructorOf(listInstructorFilter);
    titleEl.textContent = listInstructorFilter === 'all' ? '予約一覧(すべての講師)' : `予約一覧(${chosen ? chosen.name : ''})`;
  }else{
    filterSelect.style.display = 'none';
    titleEl.textContent = 'あなたの予約一覧';
  }

  let base = requests;
  if(!isUnei){
    base = base.filter(r => studentProfile && r.email === studentProfile.email);
  }else if(listInstructorFilter !== 'all'){
    base = base.filter(r => r.instructorId === listInstructorFilter);
  }

  if(base.length === 0){
    listEl.innerHTML = `<div class="list-empty">${isUnei ? 'まだ予約はありません。' : 'まだあなたの予約はありません。'}</div>`;
    return;
  }

  function sortKey(r){
    if(r.status === 'confirmed') return r.date + String(r.hour).padStart(2,'0');
    const first = r.candidates && r.candidates[0];
    return first ? first.date + String(first.hour).padStart(2,'0') : '9999';
  }
  const sorted = [...base].sort((a,b) => sortKey(a).localeCompare(sortKey(b)));

  listEl.innerHTML = sorted.map(r => {
    const ins = instructorOf(r.instructorId);
    let dateTimeLabel, statusLabel, badgeClass;
    if(r.status === 'confirmed'){
      const d = new Date(r.date + 'T00:00:00');
      dateTimeLabel = `${d.getMonth()+1}/${d.getDate()}(${weekdayJp(d)}) ${r.hour}:00〜${r.hour+1}:00`;
      statusLabel = '確定';
      badgeClass = 'confirmed';
    }else{
      dateTimeLabel = (r.candidates || []).map((c,i) => {
        const d = new Date(c.date + 'T00:00:00');
        return `${CANDIDATE_LABEL[i]} ${d.getMonth()+1}/${d.getDate()}(${weekdayJp(d)})${c.hour}:00`;
      }).join(' / ');
      statusLabel = '申請中';
      badgeClass = 'pending';
    }
    return `
      <div class="list-row">
        <span class="ins-dot" style="background:${ins ? ins.color : '#ccc'}"></span>
        <div class="list-main">
          <div><b>${ins ? escapeHtml(ins.name) : ''}</b>${r.assignedStaff ? ' ・ ' + escapeHtml(r.assignedStaff) : ''} ${escapeHtml(dateTimeLabel)} ・ ${escapeHtml(r.course || '未選択')}</div>
          <div class="meta">${escapeHtml(r.name)}${r.memo ? ' ・ ' + escapeHtml(r.memo) : ''}</div>
        </div>
        <span class="badge ${badgeClass}">${statusLabel}</span>
        <div class="list-actions">
          ${r.status === 'pending' && isUnei ? `<button class="mini-btn confirm" data-action="open-approve" data-id="${r.id}">候補を確認</button>` : ''}
          <button class="mini-btn cancel" data-action="list-cancel" data-id="${r.id}">取消</button>
        </div>
      </div>
    `;
  }).join('');
}

function monthKeyOf(dateStr){ return dateStr.slice(0,7); }
function renderReportMonthOptions(){
  const keys = new Set(requests.filter(r=>r.status==='confirmed').map(r => monthKeyOf(r.date)));
  const now = new Date();
  keys.add(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);
  const sorted = [...keys].sort().reverse();
  const current = reportMonthEl.value || sorted[0];
  reportMonthEl.innerHTML = sorted.map(k => `<option value="${k}">${k}</option>`).join('');
  reportMonthEl.value = current;
}
function renderReport(){
  renderReportMonthOptions();
  const month = reportMonthEl.value;
  const confirmed = requests.filter(r => r.status === 'confirmed' && monthKeyOf(r.date) === month);
  const byCourse = {}; COURSES.forEach(c => byCourse[c] = 0);
  const byInstructor = {}; INSTRUCTORS.forEach(i => byInstructor[i.id] = 0);
  confirmed.forEach(r => {
    if(r.course) byCourse[r.course] = (byCourse[r.course] || 0) + 1;
    byInstructor[r.instructorId] = (byInstructor[r.instructorId] || 0) + 1;
  });
  const courseRows = COURSES.map(c => `<div class="breakdown-row"><span>${escapeHtml(c)}</span><span>${byCourse[c]}件</span></div>`).join('');
  const isUnei = studentProfile && studentProfile.role === 'unei';
  const instructorSection = isUnei ? `
    <div class="breakdown-title">講師別</div>
    ${INSTRUCTORS.map(i => `<div class="breakdown-row"><span>${escapeHtml(i.name)}</span><span>${byInstructor[i.id]}件</span></div>`).join('')}
  ` : '';
  reportBodyEl.innerHTML = `
    <div class="stat-grid"><div class="stat-box"><div class="num">${confirmed.length}</div><div class="label">確定件数(${month})</div></div></div>
    <div class="breakdown-title">コース別</div>
    ${courseRows}
    ${instructorSection}
  `;
}

function getMonthGridDates(offset){
  const base = new Date();
  const first = new Date(base.getFullYear(), base.getMonth() + offset, 1);
  const startWeekday = isoWeekday(first);
  const gridStart = new Date(first);
  gridStart.setDate(first.getDate() - (startWeekday - 1));
  const dates = [];
  for(let i=0;i<42;i++){ const d = new Date(gridStart); d.setDate(gridStart.getDate() + i); dates.push(d); }
  return { dates, monthIndex: first.getMonth(), year: first.getFullYear() };
}
function renderMonthCalendar(){
  const monthGridEl = document.getElementById('month-grid');
  const monthLabelEl = document.getElementById('month-label');
  const filterSelect = document.getElementById('month-instructor-filter');
  if(!monthFilterPopulated){
    filterSelect.innerHTML = '<option value="all">すべての講師</option>' +
      INSTRUCTORS.map(i => `<option value="${i.id}">${escapeHtml(i.name)}</option>`).join('');
    filterSelect.value = monthInstructorFilter;
    monthFilterPopulated = true;
  }
  const { dates, monthIndex, year } = getMonthGridDates(monthOffset);
  monthLabelEl.textContent = `${year}年${monthIndex+1}月`;
  const today = new Date();
  const dayLabels = WEEKDAYS.map(wd => `<div class="month-daylabel">${WEEKDAY_LABEL[wd]}</div>`).join('');
  const cells = dates.map(d => {
    const inMonth = d.getMonth() === monthIndex;
    const isToday = isSameDate(d, today);
    let dayReqs = requests.filter(r => r.status === 'confirmed' && r.date === dateKey(d));
    if(monthInstructorFilter !== 'all') dayReqs = dayReqs.filter(r => r.instructorId === monthInstructorFilter);
    dayReqs = dayReqs.sort((a,b) => a.hour - b.hour);
    const events = dayReqs.map(r => {
      const ins = instructorOf(r.instructorId);
      return `<div class="month-event" style="background:${ins ? ins.color : '#999'}; color:${ins && ins.dark ? 'var(--brown)' : '#fff'};" title="${escapeHtml(ins ? ins.name : '')}${r.assignedStaff ? ' / ' + escapeHtml(r.assignedStaff) : ''} ・ ${escapeHtml(r.course || '')}">${r.hour}:00 ${escapeHtml(r.name)}</div>`;
    }).join('');
    return `<div class="month-cell${inMonth ? '' : ' other-month'}${isToday ? ' today' : ''}"><div class="daynum">${d.getDate()}</div>${events}</div>`;
  }).join('');
  monthGridEl.innerHTML = dayLabels + cells;
}

    <p class="sub">${escapeHtml(req.name)} ・ ${escapeHtml(req.course || '未選択')}</p>
    ${optionsHtml}
    ${req.memo ? `<div class="info-row"><b>メモ:</b> ${escapeHtml(req.memo)}</div>` : ''}
    <div class="modal-actions">
      ${isUnei ? `<button class="btn btn-confirm" id="c-approve">この候補で確定する</button>` : ''}
      <button class="btn btn-danger" id="c-cancel">申請を取り消す</button>
      <button class="btn btn-ghost" id="c-close">閉じる</button>
    </div>
  `;
  const approveBtn = document.getElementById('c-approve');
  if(approveBtn){
    approveBtn.addEventListener('click', async () => {
      const idx = parseInt(modalEl.querySelector('input[name="cand-choice"]:checked').value, 10);
      const chosen = req.candidates[idx];
      req.date = chosen.date;
      req.hour = chosen.hour;
      req.status = 'confirmed';
      if(req.instructorId === 'unei'){
        const d = new Date(chosen.date + 'T00:00:00');
        req.assignedStaff = assignStaffForSlot(d, chosen.hour, req.id);
      }
      await saveRequests();
      closeModal();
      renderAll();
      await sendNotification(req, 'confirmed');
      await createCalendarEvent(req);
    });
  }
  document.getElementById('c-cancel').addEventListener('click', async () => {
    requests = requests.filter(r => r.id !== req.id);
    await saveRequests();
    closeModal();
    renderAll();
  });
  document.getElementById('c-close').addEventListener('click', closeModal);
  overlayEl.classList.add('open');
}

    <h2>予約通知メールの設定</h2>
    <p class="sub">予約が申請・確定されたときに、Formspree経由でメールを送ります。</p>
    <label>Formspree フォームURL / Form ID</label>
    <input type="text" id="s-endpoint" value="${escapeHtml(notifySettings.endpoint)}" placeholder="https://formspree.io/f/xxxxxxxx または xxxxxxxx">
    <p class="help">送信される内容: 講師名(instructor)・担当者(assigned_staff)・コース(course)・生徒名(applicant_name)・メール(email)・日時(datetime)・メモ(memo)。Formspreeの「Plugins → Auto Response」を有効にすると、この email 宛にも自動で確認メールが届きます(プランによっては有料機能です)。</p>
    <div class="modal-actions">
      <button class="btn btn-primary" id="s-save">保存する</button>
      <button class="btn btn-ghost" id="s-close">閉じる</button>
    </div>
  `;

function closeSettings(){ settingsOverlayEl.classList.remove('open'); settingsContentEl.innerHTML = ''; }

function openResourceAvailability(resourceId, displayName){
  const current = availability[resourceId] || {};
  let workingNgDates = [...(ngDates[resourceId] || [])].sort();
  let rows = HOURS.map(hour => {
    let cells = WEEKDAYS.map(wd => {
      const checked = current[wd] ? current[wd].includes(hour) : true;
      return `<td><input type="checkbox" data-wd="${wd}" data-hour="${hour}" ${checked ? 'checked' : ''}></td>`;
    }).join('');
    return `<tr><td class="row-toggle" data-hour="${hour}" style="cursor:pointer; text-decoration:underline;">${hour}:00</td>${cells}</tr>`;
  }).join('');

  function ngListHtml(){
    if(workingNgDates.length === 0) return '<p class="help" style="margin-top:0;">まだNG日は登録されていません。</p>';
    return workingNgDates.map(d => `<div class="res-item"><span>${escapeHtml(d)}</span><button type="button" data-ng-remove="${escapeHtml(d)}">×</button></div>`).join('');
  }

  availabilityContentEl.innerHTML = `
    <h2>${escapeHtml(displayName)}の対応可能時間</h2>
    <p class="sub">チェックが入っている時間帯だけ、生徒が候補として選べるようになります。曜日の見出しや時刻をクリックすると、その列・行を一括でON/OFFできます。</p>
    <div class="modal-actions" style="margin-bottom:8px;">
      <button class="btn btn-ghost" type="button" id="avail-check-all" style="flex:none; padding:6px 14px; font-size:12.5px;">全て選択</button>
      <button class="btn btn-ghost" type="button" id="avail-uncheck-all" style="flex:none; padding:6px 14px; font-size:12.5px;">全て解除</button>
    </div>
    <div style="overflow-x:auto;">
      <table class="avail-table">
        <thead><tr><th></th>${WEEKDAYS.map(wd => `<th class="col-toggle" data-wd="${wd}" style="cursor:pointer; text-decoration:underline;">${WEEKDAY_LABEL[wd]}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <label>NG日を追加(その日は終日対応不可になります)</label>
    <div class="res-add" style="margin-bottom:10px;">
      <input type="date" id="ng-date-input">
      <button class="btn btn-ghost" type="button" id="ng-date-add" style="flex:none; padding:10px 16px;">追加</button>
    </div>
    <div id="ng-date-list">${ngListHtml()}</div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="a-save">保存する</button>
      <button class="btn btn-ghost" id="a-close">閉じる</button>
    </div>
  `;
  document.getElementById('avail-check-all').addEventListener('click', () => {
    availabilityContentEl.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
  });
  document.getElementById('avail-uncheck-all').addEventListener('click', () => {
    availabilityContentEl.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
  });
  availabilityContentEl.querySelectorAll('.col-toggle').forEach(th => {
    th.addEventListener('click', () => {
      const wd = th.dataset.wd;
      const boxes = availabilityContentEl.querySelectorAll(`input[data-wd="${wd}"]`);
      const allChecked = [...boxes].every(cb => cb.checked);
      boxes.forEach(cb => cb.checked = !allChecked);
    });
  });
  availabilityContentEl.querySelectorAll('.row-toggle').forEach(td => {
    td.addEventListener('click', () => {
      const hour = td.dataset.hour;
      const boxes = availabilityContentEl.querySelectorAll(`input[data-hour="${hour}"]`);
      const allChecked = [...boxes].every(cb => cb.checked);
      boxes.forEach(cb => cb.checked = !allChecked);
    });
  });
  document.getElementById('ng-date-add').addEventListener('click', () => {
    const val = document.getElementById('ng-date-input').value;
    if(!val) return;
    if(!workingNgDates.includes(val)){ workingNgDates.push(val); workingNgDates.sort(); }
    document.getElementById('ng-date-list').innerHTML = ngListHtml();
  });
  document.getElementById('ng-date-list').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-ng-remove]');
    if(!btn) return;
    workingNgDates = workingNgDates.filter(d => d !== btn.dataset.ngRemove);
    document.getElementById('ng-date-list').innerHTML = ngListHtml();
  });
  document.getElementById('a-save').addEventListener('click', async () => {
    const map = {};
    WEEKDAYS.forEach(wd => map[wd] = []);
    availabilityContentEl.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      if(cb.checked) map[cb.dataset.wd].push(parseInt(cb.dataset.hour, 10));
    });
    availability[resourceId] = map;
    ngDates[resourceId] = workingNgDates;
    await saveAvailability();
    await saveNgDates();
    setStatus('対応可能時間とNG日を保存しました。');
    closeAvailability();
    renderSchedule();
  });
  document.getElementById('a-close').addEventListener('click', closeAvailability);
  availabilityOverlayEl.classList.add('open');
}

function openAvailability(){
  if(activeInstructor === 'unei'){
    availabilityContentEl.innerHTML = `
      <h2>運営面談の担当者を選択</h2>
      <p class="sub">どなたの対応可能時間を設定しますか?(1人ずつ設定します)</p>
      <div class="modal-actions" style="flex-direction:column;">
        ${UNEI_STAFF.map(s => `<button class="btn btn-ghost" data-staff="${s.id}" style="margin-bottom:8px;">${escapeHtml(s.name)}</button>`).join('')}
      </div>
      <div class="modal-actions"><button class="btn btn-ghost" id="a-close">閉じる</button></div>
    `;
    availabilityContentEl.querySelectorAll('button[data-staff]').forEach(btn => {
      btn.addEventListener('click', () => {
        const staff = UNEI_STAFF.find(s => s.id === btn.dataset.staff);
        openResourceAvailability('unei_' + staff.id, staff.name + '(運営)');
      });
    });
    document.getElementById('a-close').addEventListener('click', closeAvailability);
    availabilityOverlayEl.classList.add('open');
    return;
  }
  const ins = instructorOf(activeInstructor);
  openResourceAvailability(activeInstructor, ins.name);
}
function closeAvailability(){ availabilityOverlayEl.classList.remove('open'); availabilityContentEl.innerHTML = ''; }

function openGoogle(){
  const calendarFields = INSTRUCTORS.map(i => `
    <label>${escapeHtml(i.name)} のカレンダーID</label>
    <input type="text" class="g-cal-input" data-ins="${i.id}" value="${escapeHtml((googleSettings.calendarIds && googleSettings.calendarIds[i.id]) || 'primary')}" placeholder="primary または xxxx@group.calendar.google.com">
  `).join('');
  googleContentEl.innerHTML = `
    <h2>Googleカレンダー連携</h2>
    <p class="sub">予約が確定すると、講師ごとに指定したGoogleカレンダーへ自動で予定を追加します。</p>
    <span class="google-status ${googleAccessToken ? 'on' : 'off'}">${googleAccessToken ? '連携済み(このブラウザのみ有効)' : '未連携'}</span>
    <label>Google Client ID</label>
    <input type="text" id="g-client" value="${escapeHtml(googleSettings.clientId)}" placeholder="xxxxxxxx.apps.googleusercontent.com">
    ${calendarFields}
    <p class="help">「primary」はこのGoogleアカウント自身のメインカレンダーです。連携するアカウントがそのカレンダーへの「変更権限」を持っている必要があります。連携は運営がこのボタンを押した端末のブラウザにのみ有効です(ブラウザを閉じると再連携が必要です)。</p>
    <div class="modal-actions">
      <button class="btn btn-primary" id="g-save">設定を保存</button>
      <button class="btn btn-confirm" id="g-connect">Googleと連携する</button>
      <button class="btn btn-ghost" id="g-close">閉じる</button>
    </div>
  `;
  document.getElementById('g-save').addEventListener('click', async () => {
    const calendarIds = {};
    googleContentEl.querySelectorAll('.g-cal-input').forEach(input => { calendarIds[input.dataset.ins] = input.value.trim() || 'primary'; });
    googleSettings = { clientId: document.getElementById('g-client').value.trim(), calendarIds };
    await saveGoogleSettings();
    setStatus('Googleカレンダー設定を保存しました。');
  });
  document.getElementById('g-connect').addEventListener('click', () => {
    if(!tokenClient){ setStatus('先にClient IDを保存してください。'); return; }
    tokenClient.requestAccessToken();
  });
  document.getElementById('g-close').addEventListener('click', () => { googleOverlayEl.classList.remove('open'); googleContentEl.innerHTML = ''; });
  googleOverlayEl.classList.add('open');
}

function showGate(){ gateCard.style.display = 'block'; mainApp.style.display = 'none'; }
function showMain(){
  gateCard.style.display = 'none';
  mainApp.style.display = 'block';
  document.getElementById('profile-name').textContent = studentProfile.name;
  document.getElementById('profile-email').textContent = studentProfile.email + (studentProfile.role === 'unei' ? ' ・ 運営' : '');
  const isUnei = studentProfile.role === 'unei';
  document.getElementById('open-settings').style.display = isUnei ? 'inline-flex' : 'none';
  document.getElementById('open-google').style.display = isUnei ? 'inline-flex' : 'none';
  document.getElementById('edit-availability').style.display = isUnei ? 'inline-block' : 'none';
  document.getElementById('month-card').style.display = isUnei ? 'block' : 'none';
}

document.getElementById('role-student').addEventListener('click', () => {
  gateRole = 'student';
  document.getElementById('role-student').classList.add('active');
  document.getElementById('role-unei').classList.remove('active');
  document.getElementById('gate-passcode-row').style.display = 'none';
  document.getElementById('gate-passcode-help').style.display = 'none';
});
document.getElementById('role-unei').addEventListener('click', () => {
  gateRole = 'unei';
  document.getElementById('role-unei').classList.add('active');
  document.getElementById('role-student').classList.remove('active');
  document.getElementById('gate-passcode-row').style.display = 'flex';
  const helpEl = document.getElementById('gate-passcode-help');
  helpEl.style.display = 'block';
  helpEl.textContent = operatorPasscode ? '運営パスコードを入力してください。' : 'まだ運営パスコードが設定されていません。ここで入力した内容が新しいパスコードになります。';
});

document.getElementById('gate-submit').addEventListener('click', async () => {
  const name = document.getElementById('gate-name').value.trim();
  const email = document.getElementById('gate-email').value.trim();
  if(!name || !email){ setStatus('お名前とメールアドレスを入力してください。'); return; }
  if(gateRole === 'unei'){
    const passcode = document.getElementById('gate-passcode').value;
    if(!passcode){ setStatus('運営パスコードを入力してください。'); return; }
    if(!operatorPasscode){ await saveOperatorPasscode(passcode); }
    else if(passcode !== operatorPasscode){ setStatus('運営パスコードが違います。'); return; }
  }
  await saveProfile({ name, email, role: gateRole });
  setStatus('');
  showMain();
  renderAll();
});

document.getElementById('profile-edit').addEventListener('click', () => {
  document.getElementById('gate-name').value = studentProfile.name;
  document.getElementById('gate-email').value = studentProfile.email;
  const roleBtn = studentProfile.role === 'unei' ? document.getElementById('role-unei') : document.getElementById('role-student');
  roleBtn.click();
  showGate();
});

tabsEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.tab-btn');
  if(!btn) return;
  activeInstructor = btn.dataset.id;
  selectedCandidates = [];
  renderTabs();
  renderSchedule();
  renderCandidateBar();
});

document.getElementById('prev-week').addEventListener('click', () => { weekOffset -= 1; renderSchedule(); });
document.getElementById('next-week').addEventListener('click', () => { weekOffset += 1; renderSchedule(); });
document.getElementById('prev-month').addEventListener('click', () => { monthOffset -= 1; renderMonthCalendar(); });
document.getElementById('next-month').addEventListener('click', () => { monthOffset += 1; renderMonthCalendar(); });
document.getElementById('report-toggle').addEventListener('click', () => {
  const body = document.getElementById('report-collapsible');
  const btn = document.getElementById('report-toggle');
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? 'block' : 'none';
  btn.textContent = hidden ? '隠す ▲' : '表示する ▼';
});
document.getElementById('month-instructor-filter').addEventListener('change', (e) => {
  monthInstructorFilter = e.target.value;
  renderMonthCalendar();
});
document.getElementById('edit-availability').addEventListener('click', openAvailability);

scheduleEl.addEventListener('click', (e) => {
  const cell = e.target.closest('td[data-date]');
  if(!cell) return;
  const dstr = cell.dataset.date;
  const hour = parseInt(cell.dataset.hour, 10);
  const clickable = cell.dataset.clickable === 'true';
  const d = new Date(dstr + 'T00:00:00');
  const cellReqs = getCellRequests(activeInstructor, d, hour);

  if(!clickable && cellReqs.length > 0){
    openCellInfoModal(dstr, hour);
    return;
  }
  if(!clickable) return;

  const idx = selectedCandidates.findIndex(c => c.date === dstr && c.hour === hour);
  if(idx >= 0){
    selectedCandidates.splice(idx, 1);
  }else{
    if(selectedCandidates.length >= 3){ setStatus('候補は最大3件までです。'); return; }
    selectedCandidates.push({ date: dstr, hour });
  }
  renderSchedule();
  renderCandidateBar();
});

document.getElementById('candidate-clear').addEventListener('click', () => {
  selectedCandidates = [];
  renderSchedule();
  renderCandidateBar();
});
document.getElementById('candidate-submit').addEventListener('click', openCandidateApplyModal);

listEl.addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-action]');
  if(!btn) return;
  const id = btn.dataset.id;
  const req = requests.find(r => r.id === id);
  if(!req) return;
  if(btn.dataset.action === 'open-approve'){
    openCandidateApprovalModal(id);
  }
  if(btn.dataset.action === 'list-cancel'){
    requests = requests.filter(r => r.id !== id);
    await saveRequests();
    renderAll();
  }
});

reportMonthEl.addEventListener('change', renderReport);
document.getElementById('list-instructor-filter').addEventListener('change', (e) => {
  listInstructorFilter = e.target.value;
  renderList();
});
document.getElementById('open-settings').addEventListener('click', openSettings);
document.getElementById('open-google').addEventListener('click', openGoogle);

overlayEl.addEventListener('click', (e) => { if(e.target === overlayEl) closeModal(); });
settingsOverlayEl.addEventListener('click', (e) => { if(e.target === settingsOverlayEl) closeSettings(); });
availabilityOverlayEl.addEventListener('click', (e) => { if(e.target === availabilityOverlayEl) closeAvailability(); });
googleOverlayEl.addEventListener('click', (e) => { if(e.target === googleOverlayEl){ googleOverlayEl.classList.remove('open'); googleContentEl.innerHTML = ''; } });

(async function init(){
  setStatus('読み込み中…');
  await Promise.all([loadProfile(), loadRequests(), loadAvailability(), loadNgDates(), loadNotifySettings(), loadGoogleSettings(), loadOperatorPasscode()]);
  setStatus('');
  setupTokenClient();
  if(studentProfile){ showMain(); renderAll(); } else { showGate(); }
})();
</script>
